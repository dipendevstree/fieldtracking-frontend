<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/favicon.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/favicon_light.svg"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon_light.png"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>FieldTrack360</title>
    <meta name="title" content="FieldTrack360" />
    <meta
      name="description"
      content="Manage your field teams, track live locations, schedule visits, and analyze performance — all in one powerful dashboard. FieldTrack360 simplifies field operations management for growing businesses."
    />
    <meta
      name="keywords"
      content="field tracking, sales management, field service, live tracking, task management, employee tracking, business analytics, operations dashboard"
    />
    <meta name="author" content="FieldTrack360 Team" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fieldtrack360.com" />
    <meta property="og:title" content="FieldTrack360" />
    <meta
      property="og:description"
      content="A professional web platform to manage field sales, live tracking, and productivity analytics in real time."
    />
    <meta property="og:image" content="https://fieldtrack360.com/images/preview.png" />

    <!-- Twitter Meta -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://fieldtrack360.com" />
    <meta
      property="twitter:title"
      content="FieldTrack360"
    />
    <meta
      property="twitter:description"
      content="FieldTrack360 is your all-in-one platform for field operations, live tracking, and performance insights."
    />
    <meta property="twitter:image" content="https://fieldtrack360.com/images/preview.png" />

    <!-- Contact Information -->
    <meta name="contact:email" content="support@fieldtrack360.com" />
    <meta name="contact:phone" content="+91-99999-99999" />
    <meta name="contact:address" content="FieldTrack360 HQ, Ahmedabad, India" />

    <!-- Business Information -->
    <meta name="business:name" content="FieldTrack360" />
    <meta name="business:type" content="Field Sales & Tracking Software" />
    <meta name="business:hours" content="Mon–Sat 9:00 AM – 6:00 PM IST" />

    <!-- Font Family -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data for FieldTrack360  Business -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "FieldTrack360",
        "url": "https://fieldtrack360.com",
        "description": "A comprehensive platform for field sales tracking, visit scheduling, and performance analytics.",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web Browser",
        "offers": {
          "@type": "Offer",
          "category": "Field Sales Management"
        },
        "provider": {
          "@type": "Organization",
          "name": "FieldTrack360",
          "url": "https://fieldtrack360.com",
          "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+91-99999-99999",
            "email": "support@fieldtrack360.com",
            "contactType": "Customer Support",
            "availableLanguage": ["English"]
          }
        }
      }
    </script>

    <meta name="theme-color" content="#1f2937" />
  </head>

  <body class="group/body">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
