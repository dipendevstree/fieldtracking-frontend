name:Field tracking frontend deploy to staging

on:
  push:
    branches:
      - development

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP }} << 'EOF'
            set -e

            APP_DIR="/var/www/html/fieldtracking-frontend"
            

            echo "=== Starting deployment ==="

            cd $APP_DIR

            # Ensure correct Node (load NVM)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 22.17.1

            # Pull latest code
            git pull origin development

            # Install dependencies
            pnpm install

            # Build project
            pnpm run build

            echo "=== Deployment complete ==="
          EOF
